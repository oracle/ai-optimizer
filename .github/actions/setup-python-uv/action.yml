name: Setup Python + uv
description: Install Python, uv, and project dependencies with uv cache

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.11"
  extras:
    description: Extras to install (e.g. "client,dev" or "server,dev")
    required: true
  cache-suffix:
    description: Extra key component to scope the uv cache per variant
    required: false
    default: default

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache uv
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ inputs.cache-suffix }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ inputs.cache-suffix }}-
          ${{ runner.os }}-uv-

    - name: Install uv and project extras
      shell: bash
      run: |
        python -m pip install --upgrade pip wheel setuptools uv
        uv pip install -e ".[${{ inputs.extras }}]" --system
