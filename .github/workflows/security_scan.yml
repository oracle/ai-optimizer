# Security scanning for container image vulnerabilities and GitHub Actions integrity
name: Security Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "pyproject.toml"
      - "src/Dockerfile"
      - ".github/workflows/**"

  schedule:
    # Daily security scan at 06:00 UTC
    - cron: "0 6 * * *"

  # Allows running this workflow manually
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Trivy security scan
  trivy-scan:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Shared cache scope with image_smoke.yml's aio build so PR runs reuse
      # layers across workflows. Scheduled runs still pay a cold cache.
      - name: Build AIO Container Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: src/Dockerfile
          tags: aio:${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha,scope=aio-image
          cache-to: type=gha,mode=max,scope=aio-image,compression=zstd

      - name: Prepare Trivy Cache Directory
        run: mkdir -p "${{ github.workspace }}/.trivy-cache"

      - name: Get Date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.trivy-cache
          key: trivy-db-${{ steps.date.outputs.today }}
          restore-keys: |
            trivy-db-

      # One scan produces HIGH+CRITICAL JSON; two fast `trivy convert` calls
      # derive the SARIF (CRITICAL only, uploaded to Security tab) and the
      # table (HIGH+CRITICAL, logged for maintainer awareness).
      #
      # Skips ibm_watsonx_ai/connections.py: docstring shows a Google BigQuery
      # service-account JSON example with placeholder values, which Trivy's
      # secret scanner flags as a GCP service-account credential.
      - name: Run Trivy Scan (JSON)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/.trivy-cache:/root/.cache/trivy" \
            ghcr.io/aquasecurity/trivy:0.71.1 \
            image \
            --severity HIGH,CRITICAL \
            --format json \
            --output /workspace/trivy-results.json \
            --ignore-unfixed \
            --skip-files "**/ibm_watsonx_ai/connections.py" \
            --exit-code 0 \
            "aio:${{ github.sha }}"

      - name: Log HIGH+CRITICAL Findings
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.71.1 \
            convert --format table \
            /workspace/trivy-results.json

      - name: Generate CRITICAL-only SARIF (fails build on CRITICAL)
        if: always()
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.71.1 \
            convert \
            --severity CRITICAL \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --exit-code 1 \
            /workspace/trivy-results.json

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-aio

      - name: Fix Trivy Cache Permissions
        # Trivy runs as root inside the container, so cache files are owned by
        # root. Reclaim ownership so the actions/cache post-step can tar them.
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/.trivy-cache"

  # Macaron - check GitHub Actions for known vulnerabilities
  macaron:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Macaron Security Analysis
        uses: oracle/macaron@4ddb55e3c9ef2c77b548be55c557078c4476fd9c # v0.24.0
        with:
          repo_path: "https://github.com/${{ github.repository }}"
          branch: ${{ github.head_ref || github.ref_name }}
          digest: ${{ github.event.pull_request.head.sha || github.sha }}
          policy_file: check-github-actions
          policy_purl: "pkg:github.com/${{ github.repository }}@.*"
          reports_retention_days: 90
