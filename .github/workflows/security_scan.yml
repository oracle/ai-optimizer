# Security scanning for container image vulnerabilities and GitHub Actions integrity
name: Security Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "pyproject.toml"
      - "src/Dockerfile"
      - ".github/workflows/**"

  schedule:
    # Daily security scan at 06:00 UTC
    - cron: "0 6 * * *"

  # Allows running this workflow manually
  workflow_dispatch:

jobs:
  # Build AIO image for vulnerability scanning
  build-aio:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AIO Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Dockerfile
          tags: aio:${{ github.sha }}
          outputs: type=docker,dest=/tmp/aio-image.tar
          push: false

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aio-image
          path: /tmp/aio-image.tar
          retention-days: 1

  # Trivy security scan
  trivy-scan:
    needs: build-aio
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: aio-image
          path: /tmp

      - name: Load Image
        run: docker load -i /tmp/aio-image.tar

      # Generate SARIF output (always succeeds so SARIF is uploaded)
      - name: Run Trivy Scan (SARIF)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --ignore-unfixed \
            --exit-code 0 \
            "aio:${{ github.sha }}"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-aio

      # Run again with table format - fails the job if vulnerabilities found
      - name: Check for Vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            image \
            --severity HIGH,CRITICAL \
            --format table \
            --output /workspace/trivy-results.txt \
            --ignore-unfixed \
            --exit-code 1 \
            "aio:${{ github.sha }}"

  # Grype security scan
  grype-scan:
    needs: build-aio
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: aio-image
          path: /tmp

      - name: Load Image
        run: docker load -i /tmp/aio-image.tar

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # Generate SARIF output (always succeeds so SARIF is uploaded)
      - name: Run Grype Scan (SARIF)
        run: |
          grype \
            "docker:aio:${{ github.sha }}" \
            --only-fixed \
            --fail-on high \
            --output sarif \
            --file grype-results.sarif || true

      - name: Upload Grype SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: grype-aio

      # Run again with table format - fails the job if vulnerabilities found
      - name: Check for Vulnerabilities
        run: |
          grype \
            "docker:aio:${{ github.sha }}" \
            --only-fixed \
            --fail-on high \
            --output table \
            --file grype-results.txt

  # Macaron - check GitHub Actions for known vulnerabilities
  macaron:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run Macaron Security Analysis
        uses: oracle/macaron@b31acfe389133a5587d9639063ec70cb84e7bc47 # v0.23.0
        with:
          repo_path: "https://github.com/${{ github.repository }}"
          policy_file: check-github-actions
          policy_purl: "pkg:github.com/${{ github.repository }}@.*"
          reports_retention_days: 90

  # Summary job
  security-summary:
    name: Security Summary
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    needs: [trivy-scan, grype-scan, macaron]

    steps:
      - name: Check Results
        run: |
          echo "========================================================"
          echo "Security Scan Summary"
          echo "========================================================"
          echo "Trigger: ${{ github.event_name }}"
          echo ""

          FAILED=false

          if [ "${{ needs.trivy-scan.result }}" = "success" ]; then
            echo "✅ Trivy security scan: passed"
          else
            echo "❌ Trivy security scan: ${{ needs.trivy-scan.result }}"
            FAILED=true
          fi

          if [ "${{ needs.grype-scan.result }}" = "success" ]; then
            echo "✅ Grype security scan: passed"
          else
            echo "❌ Grype security scan: ${{ needs.grype-scan.result }}"
            FAILED=true
          fi

          if [ "${{ needs.macaron.result }}" = "success" ]; then
            echo "✅ Macaron GitHub Actions check: passed"
          else
            echo "❌ Macaron GitHub Actions check: ${{ needs.macaron.result }}"
            FAILED=true
          fi

          echo "========================================================"

          if [ "$FAILED" = "true" ]; then
            echo "❌ One or more security checks failed"
            exit 1
          else
            echo "✅ All security checks passed"
          fi
