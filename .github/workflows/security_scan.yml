# Security scanning for container image vulnerabilities and GitHub Actions integrity
name: Security Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "pyproject.toml"
      - "src/Dockerfile"
      - ".github/workflows/**"

  schedule:
    # Daily security scan at 06:00 UTC
    - cron: "0 6 * * *"

  # Allows running this workflow manually
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Trivy security scan
  trivy-scan:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build AIO Container Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: src/Dockerfile
          tags: aio:${{ github.sha }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/.trivy-cache
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy Scan (CRITICAL - SARIF)
        # Skips ibm_watsonx_ai/connections.py: docstring shows a Google BigQuery
        # service-account JSON example with placeholder values, which Trivy's
        # secret scanner flags as a GCP service-account credential.
        run: |
          mkdir -p "${{ github.workspace }}/.trivy-cache"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/.trivy-cache:/root/.cache/trivy" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            image \
            --severity CRITICAL \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --ignore-unfixed \
            --skip-files "**/ibm_watsonx_ai/connections.py" \
            --exit-code 1 \
            "aio:${{ github.sha }}"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy Scan (HIGH+CRITICAL - Log)
        # HIGH findings logged for maintainer awareness but not uploaded
        # to the Security tab to avoid surfacing non-actionable OS-level alerts.
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivy-cache:/root/.cache/trivy" \
            ghcr.io/aquasecurity/trivy:0.69.3 \
            image \
            --severity HIGH,CRITICAL \
            --format table \
            --ignore-unfixed \
            --skip-files "**/ibm_watsonx_ai/connections.py" \
            "aio:${{ github.sha }}"
          category: trivy-aio

  # Macaron - check GitHub Actions for known vulnerabilities
  macaron:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Macaron Security Analysis
        uses: oracle/macaron@b31acfe389133a5587d9639063ec70cb84e7bc47 # v0.23.0
        with:
          repo_path: "https://github.com/${{ github.repository }}"
          branch: ${{ github.head_ref || github.ref_name }}
          digest: ${{ github.event.pull_request.head.sha || github.sha }}
          policy_file: check-github-actions
          policy_purl: "pkg:github.com/${{ github.repository }}@.*"
          reports_retention_days: 90

  # Summary job
  security-summary:
    name: Security Summary
    if: always() && !cancelled() && (github.event.pull_request.draft == false || github.event_name != 'pull_request')
    runs-on: ubuntu-latest
    permissions: {}
    needs: [trivy-scan, macaron]

    steps:
      - name: Check Results
        run: |
          echo "========================================================"
          echo "Security Scan Summary"
          echo "========================================================"
          echo "Trigger: ${{ github.event_name }}"
          echo ""

          FAILED=false

          if [ "${{ needs.trivy-scan.result }}" = "success" ]; then
            echo "✅ Trivy security scan: passed"
          else
            echo "❌ Trivy security scan: ${{ needs.trivy-scan.result }}"
            FAILED=true
          fi

          if [ "${{ needs.macaron.result }}" = "success" ]; then
            echo "✅ Macaron GitHub Actions check: passed"
          else
            echo "❌ Macaron GitHub Actions check: ${{ needs.macaron.result }}"
            FAILED=true
          fi

          echo "========================================================"

          if [ "$FAILED" = "true" ]; then
            echo "❌ One or more security checks failed"
            exit 1
          else
            echo "✅ All security checks passed"
          fi
