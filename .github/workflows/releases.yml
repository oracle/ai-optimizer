name: Build Release
on:
  release:
    types: [published]

concurrency:
  group: releases-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Compute Artifact Names
        id: names
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}"
          echo "iac=${REPO_NAME}-iac" >> "$GITHUB_OUTPUT"
          echo "src=${REPO_NAME}-src" >> "$GITHUB_OUTPUT"
          echo "IAC artifact base: ${REPO_NAME}-iac"
          echo "SRC artifact base: ${REPO_NAME}-src"

      - name: Validate and Extract Version from Tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          if [[ ! $TAG_NAME =~ ^v[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Invalid tag name format: $TAG_NAME"
            echo "Must be in the format vMAJOR.MINOR.PATCH (e.g. v1.2.3)"
            exit 1
          fi
          VERSION=${TAG_NAME#v}
          echo "Tag validated: $TAG_NAME"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Inject Static Version into _version.py, versions.tf, and Chart.yaml
        run: |
          echo "__version__ = \"$VERSION\"" > src/_version.py
          sed -i "s/app_version[[:space:]]*=[[:space:]]*\".*\"/app_version = \"$VERSION\"/" opentofu/versions.tf
          sed -i "s/^version:[[:space:]]*.*$/version: $VERSION/" helm/Chart.yaml
          sed -i "s/^appVersion:[[:space:]]*\".*\"$/appVersion: \"$VERSION\"/" helm/Chart.yaml
          echo "Injected version:"
          cat src/_version.py
          cat opentofu/versions.tf
          cat helm/Chart.yaml
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build and Push Source
        run: |
          zip -r $RUNNER_TEMP/${{ steps.names.outputs.src }}.zip src pyproject.toml .dockerignore
          tar -czf "$RUNNER_TEMP/${{ steps.names.outputs.src }}.tar.gz" src pyproject.toml .dockerignore
          gh release upload ${{github.event.release.tag_name}} "$RUNNER_TEMP/${{ steps.names.outputs.src }}.zip" --clobber
          gh release upload ${{github.event.release.tag_name}} "$RUNNER_TEMP/${{ steps.names.outputs.src }}.tar.gz" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        shell: bash

      - name: Build and Push Infrastructure as Code
        run: |
          cd opentofu
          zip -r $RUNNER_TEMP/${{ steps.names.outputs.iac }}.zip . \
            -x "terraform*" ".terraform*" "*/terraform*" "*/.terraform*" \
            -x "cfgmgt/stage/*.*" "*.tfplan*" "examples/*" "*.md" ".gitignore" "*pycache*"
          gh release upload ${{github.event.release.tag_name}} "$RUNNER_TEMP/${{ steps.names.outputs.iac }}.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        shell: bash

      - name: Trigger Documentation/Helm Deployment
        run: gh workflow run documentation.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
