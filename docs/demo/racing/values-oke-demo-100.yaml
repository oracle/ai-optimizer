# Capacity overlay for a hands-on OKE demo with about 100 concurrent attendees
# (sized for the docs/demo/racing run-of-show). Apply after the base
# OpenTofu/Helm deployment, from the repository root:
#
#   helm upgrade <release> ./helm \
#     --namespace <namespace> \
#     --reuse-values \
#     --values docs/demo/racing/values-oke-demo-100.yaml
#
# Enables the client UI access gate (client.passwordAutoGenerate). The chart
# creates `<release>-ai-optimizer-client-password` with an auto-generated
# password on first install and preserves it across upgrades via
# helm.sh/resource-policy: keep. Read it back to share with attendees:
#
#   kubectl -n <namespace> get secret <release>-ai-optimizer-client-password \
#     -o jsonpath='{.data.password}' | base64 -d
#
# This is a starting point, not a guarantee. Validate against the actual model
# provider quotas, ADB session limits, node pool capacity, and ingress behavior.
#
# For 100 attendees, pre-create vector stores or tightly control document
# embedding. Parsing, embedding, database writes, and vector index creation
# saturate the demo path faster than chat traffic does — for the racing demo
# the per-driver corpus is small, but uncontrolled uploads will still overrun
# the shared embedding budget.
#
# The server intentionally remains single-replica. Local file upload followed
# by /v1/embed/ depends on per-pod emptyDir storage; do not scale server pods
# above one unless the ingress/load balancer is configured and tested for
# sticky routing.

# helm upgrade ai-optimizer ../../../helm -n bcurace --reuse-values --values values-oke-demo-100.yaml
server:
  replicaCount: 1
  maxClients: 300
  # Do not pin an image here — with `helm upgrade --reuse-values`, any
  # image fields set in this overlay would replace whatever server image
  # the base deployment is using. The capacity overlay should leave the
  # registry/repository/tag inherited.
  envSecret:
    content:
      AIO_DB_POOL_SIZE: "30"
  resources:
    requests:
      cpu: "3000m"
      memory: "6Gi"
    limits:
      cpu: "6000m"
      memory: "12Gi"

client:
  replicaCount: 1
  passwordAutoGenerate: true
  resources:
    requests:
      cpu: "1500m"
      memory: "3Gi"
    limits:
      cpu: "3000m"
      memory: "6Gi"
  livenessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
