# spell-checker: disable

global:
  env: "prd"
  api:
    secretName: "${label}-optimizer-api-key"

# -- API Server configuration
server:
  image:
    repository: ${repository_base}/ai-optimizer-server
    tag: "latest"
    pullPolicy: Always

  ingress:
    enabled: true
    className: native-ic
    annotations:
%{ if ssl_enabled ~}
      oci-native-ingress.oraclecloud.com/https-listener-port: "443"
%{ else ~}
      oci-native-ingress.oraclecloud.com/http-listener-port: "80"
%{ endif ~}
      oci-native-ingress.oraclecloud.com/healthcheck-protocol: HTTP
      oci-native-ingress.oraclecloud.com/healthcheck-path: "/v1/readiness"
%{ if ssl_enabled ~}
    tls:
      - secretName: ${label}-tls
%{ endif ~}

  service:
    type: "NodePort"

  # -- Enable Workload Identity
  oci_config:
    oke: true
    region: "${oci_region}"

  # -- Oracle Database Configuration
  database:
%{ if db_type == "OTHER" ~}
    type: "OTHER"
    other:
      dsn: "${db_dsn}"
%{ else ~}
    type: "ADB-S"
    oci:
      ocid: "${db_ocid}"
%{ endif ~}
    authN:
      secretName: "${db_name}-optimizer-db-authn"
    privAuthN:
      secretName: "${db_name}-db-priv-authn"

client:
  enabled: true
  image:
    repository: ${repository_base}/ai-optimizer-client
    tag: "latest"
    pullPolicy: Always

  ingress:
    enabled: true
    className: native-ic
    annotations:
%{ if ssl_enabled ~}
      oci-native-ingress.oraclecloud.com/https-listener-port: "443"
%{ else ~}
      oci-native-ingress.oraclecloud.com/http-listener-port: "80"
%{ endif ~}
      oci-native-ingress.oraclecloud.com/healthcheck-protocol: HTTP
      oci-native-ingress.oraclecloud.com/healthcheck-path: "/_stcore/health"
%{ if ssl_enabled ~}
    tls:
      - secretName: ${label}-tls
%{ endif ~}

  service:
    type: "NodePort"

  features:
    disableTestbed: false
    disableApi: false
    disableTools: false
    disableDbCfg: false
    disableModelCfg: false
    disableOciCfg: false
    disableSettings: false

ollama:
  enabled: ${node_pool_gpu_deploy}
  models:
    enabled: true
    modelPullList:
      - qwen3:8b
      - mxbai-embed-large
  resources:
    limits:
      nvidia.com/gpu: 1
