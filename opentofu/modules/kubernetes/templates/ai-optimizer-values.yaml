# spell-checker: disable

global:
  env: "prd"
  api:
    secretName: "${label}-optimizer-api-key"

# -- API Server configuration
server:
  image:
    repository: ${repository_base}/ai-optimizer-server
    tag: "latest"
    pullPolicy: Always

  ingress:
    enabled: true
    className: native-ic
    annotations:
      oci-native-ingress.oraclecloud.com/healthcheck-protocol: HTTP
      oci-native-ingress.oraclecloud.com/healthcheck-path: "/v1/readiness"
      oci-native-ingress.oraclecloud.com/http-listener-port: "80"
  service:
    type: "NodePort"

  # -- Enable Workload Identity
  oci_config:
    oke: true
    region: "${oci_region}"

  # -- OpenTelemetry export to the in-cluster SigNoz collector.
  # Endpoint auto-populates from signoz.enabled below; otel must follow
  # signoz_enabled because the chart validator rejects otel-on with no
  # endpoint.
  otel:
    enabled: ${signoz_enabled}
    insecure: true

  # -- Oracle Database Configuration
  database:
%{ if db_type == "OTHER" ~}
    type: "OTHER"
    other:
      dsn: "${db_dsn}"
%{ else ~}
    type: "ADB-S"
    oci:
      ocid: "${db_ocid}"
%{ endif ~}
    authN:
      secretName: "${db_name}-optimizer-db-authn"
    privAuthN:
      secretName: "${db_name}-db-priv-authn"

client:
  enabled: true
  cookieSecret: "${client_cookie_secret}"
  image:
    repository: ${repository_base}/ai-optimizer-client
    tag: "latest"
    pullPolicy: Always

  ingress:
    enabled: true
    className: native-ic
    annotations:
      oci-native-ingress.oraclecloud.com/healthcheck-protocol: HTTP
      oci-native-ingress.oraclecloud.com/healthcheck-path: "/_stcore/health"
      oci-native-ingress.oraclecloud.com/http-listener-port: "80"
  service:
    type: "NodePort"

  features:
    disableTestbed: false
    disableApi: false
    disableTools: false
    disableDbCfg: false
    disableModelCfg: false
    disableOciCfg: false
    disableSettings: false

# -- Self-hosted SigNoz observability backend. The BYO branch routes every
# image via signoz.global.imageRegistry and disables the clickhouse `udf`
# initContainer (it fetches histogram-quantile from github.com at pod start,
# which an airgapped cluster cannot reach; the histogramQuantile UDF is
# lost as a result). Reach the UI via:
#   kubectl port-forward -n <ns> svc/<release>-signoz 8080:8080
signoz:
  enabled: ${signoz_enabled}
%{ if signoz_image_registry != "" ~}
  global:
    imageRegistry: "${signoz_image_registry}"
  clickhouse:
    initContainers:
      udf:
        enabled: false
%{ endif ~}

ollama:
  enabled: ${node_pool_gpu_deploy}
  models:
    enabled: true
    modelPullList:
      - qwen3:8b
      - mxbai-embed-large
  resources:
    limits:
      nvidia.com/gpu: 1
