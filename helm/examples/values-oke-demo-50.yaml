# Capacity overlay for a hands-on OKE demo with about 50 concurrent attendees.
# Use this in addition to your normal database/model/ingress values.
#
# The server intentionally remains single-replica. Local file upload followed
# by /v1/embed/ depends on per-pod emptyDir storage; do not scale server pods
# above one unless the ingress/load balancer is configured and tested for
# sticky routing.

server:
  replicaCount: 1
  maxClients: 150
  envSecret:
    content:
      AIO_DB_POOL_SIZE: "20"
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"

client:
  replicaCount: 1
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  livenessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
