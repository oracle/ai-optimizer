# Capacity overlay for a hands-on OKE demo with about 200 concurrent attendees.
# Use this after the base OpenTofu/Helm deployment:
#
#   helm upgrade <release> ./helm \
#     --namespace <namespace> \
#     --reuse-values \
#     --values helm/examples/values-oke-demo-200.yaml
#
# This is a starting point, not a guarantee. Validate against the actual model
# provider quotas, ADB session limits, node pool capacity, and ingress behavior.
#
# For 200 attendees, pre-create vector stores or tightly control document
# embedding. Do not allow 200 users to upload and embed arbitrary documents at
# once; parsing, embedding, database writes, and vector index creation will
# overwhelm the demo path before chat traffic does.
#
# The server intentionally remains single-replica. Local file upload followed
# by /v1/embed/ depends on per-pod emptyDir storage; do not scale server pods
# above one unless the ingress/load balancer is configured and tested for
# sticky routing.

server:
  replicaCount: 1
  maxClients: 500
  envSecret:
    content:
      AIO_DB_POOL_SIZE: "50"
  resources:
    requests:
      cpu: "4000m"
      memory: "8Gi"
    limits:
      cpu: "8000m"
      memory: "16Gi"

client:
  replicaCount: 1
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  livenessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
