# spell-checker: ignore ollama

# fullnameOverride: will override the default naming convention: <release-name>-<chart-name>
# Use with caution, as it disables Helm's automatic naming and can cause name collisions.
fullnameOverride: ""

# nameOverride: changes only the chart name portion of resource names but keeps the release name prefix.
nameOverride: ""

# -----------------------
# -- Global Configuration
global:
  # -- Either:
  # 1) Provide the 'apiKey' directly
  # 2) Provide a secretName referring to an existing Secret containing the API key.
  api:
    # -- Key for making API calls to the server.
    # Recommended to supply at command line or use the secretName to avoid storing in the values file.
    # Example: "abcd1234opt5678"
    apiKey: ""

    # -- Name of the Secret that stores the API key.
    # This allows you to keep the API key out of the values file and manage it securely via Secrets.
    # Example: "optimizer-api-keys"
    secretName: ""

    # -- Key name inside the Secret that contains the API key when secretName defined.
    secretKey: "apiKey"

  # -- URL path appended to the host.
  # Example: "/test" results in URLs like http://hostname/test/...
  baseUrlPath: "/"

  # -- Environment name. Controls which .env file pydantic-settings reads (.env.{env})
  # and which file path the envSecret is mounted as (/app/src/.env.{env}).
  env: "prd"

  # -- Mirror registry for private-registry deployments. When non-empty, replaces
  # the `registry` portion of every component image in this chart (server,
  # client, ollama, database, utilities) and propagates into the SigNoz subchart
  # via Helm's global injection. Component-level `image.registry` values
  # are ignored while this is set.
  # Example: "mirror.acme.local"
  imageRegistry: ""

  # -- Image pull secrets applied to every pod spec in this chart, and
  # propagated into the SigNoz subchart. Component-level `imagePullSecrets`
  # are merged with this list. Each entry is a Secret of type
  # kubernetes.io/dockerconfigjson that must already exist in the namespace.
  # Use the bare-string form here: the SigNoz subchart's pull-secret helper
  # renders `- name: {{ . }}` and would emit `name: map[name:...]` for the
  # `{name: ...}` map form. Component-level `<component>.imagePullSecrets`
  # below accept either form, since they're consumed only by this chart.
  # Example: [mirror-creds]
  imagePullSecrets: []

  # -- When true, the SigNoz uninstall cleanup hook deletes every PVC
  # created by this release — ClickHouse plus the StatefulSet-owned
  # `volumeClaimTemplates` PVCs (zookeeper, signoz-db, …) that Kubernetes
  # retains by default. The sweep is scoped to `app.kubernetes.io/instance=<release>`,
  # so parallel installs in the same namespace each clean only their own.
  # Defaults to false so telemetry data survives uninstall unless explicitly discarded.
  cleanupPVCs: false

# -----------------------
# -- Shared utility images used by chart-managed jobs (not tied to a
# single component). Each entry is consumed via the `global.image`
# helper, so `global.imageRegistry` overrides the per-image `registry`.
utilities:
  sqlcl:
    image:
      registry: container-registry.oracle.com
      repository: database/sqlcl
      tag: "25.3.0"
      pullPolicy: IfNotPresent

  curl:
    image:
      registry: docker.io
      repository: curlimages/curl
      tag: "8.20.0"
      pullPolicy: IfNotPresent

  kubectl:
    image:
      registry: docker.io
      repository: alpine/k8s
      tag: "1.28.13"
      pullPolicy: IfNotPresent

# -----------------------
# Server Configuration
server:
  # -- Number of desired pod replicas for the Deployment when autoscaling is disabled
  # NOTE on multi-replica + the embed pipeline:
  #   * Embed JOB STATUS is shared via the CORE database (aio_embed_jobs),
  #     so a `GET /v1/embed/jobs/{job_id}` poll routed to any pod returns
  #     the correct state.
  #   * Embed PIPELINE EXECUTION (and the uploaded source files it
  #     consumes) is per-pod — file storage lives on a per-pod emptyDir
  #     volume. A client's `POST /v1/embed/local/store` followed by
  #     `POST /v1/embed/` must therefore land on the same pod, which
  #     requires sticky / session-affinity routing at the LB or ingress
  #     when replicaCount > 1.
  replicaCount: 1

  # -- Max number of distinct client sessions cached in memory (LRU eviction beyond this)
  maxClients: 64

  # autoscaling: HPA when enabled, requires metrics-server to be installed
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  # -- Secret name containing image pull secrets
  imagePullSecrets: []
    # - name: registry_cred

  # image: Image and Tag to pull including pull policy
  image:
    # -- Registry host. Overridden by global.imageRegistry when that is set.
    registry: localhost
    # -- Image repository (path part, no host)
    repository: ai-optimizer-server
    pullPolicy: IfNotPresent
    # -- Image tag. Empty defaults to Chart.appVersion.
    tag: ""

  # service: type of Kubernetes service to expose server port.
  service:
    type: "ClusterIP"
    # -- Service port the server is reachable on (also used by the client to
    # dial the server). The container always listens on 8000.
    port: 8000

  # ssl: enable HTTPS on the uvicorn server.
  # Set enabled to true and optionally provide paths to cert/key files mounted into the container.
  # When certFile and keyFile are empty, a self-signed certificate is auto-generated at startup.
  ssl:
    enabled: false
    certFile: ""
    keyFile: ""

  # Gateway: controls the Gateway API resources to expose the service
  gateway:
    enabled: false
    className: eg # GatewayClass name (e.g., "eg" for Envoy Gateway controller)
#    tls:
#      mode: Terminate
#      certificateRefs:
#        - kind: Secret
#          group: ""
#          name: default-cert

  # ingress: controls the Ingress resource to expose the service.
  ingress:
    enabled: false
    className: nginx # IngressClass name (e.g., "nginx" for NGINX ingress controller)
    tls: []
      # - hosts:
      #     - example.com
      #   secretName: example-tls

  # -- Oracle Database Configuration
  database:
    # -- Either SIDB-FREE, ADB-FREE, ADB-S (OCI), or OTHER
    type: ""
    # -- For SIDB-FREE/ADB-FREE, location of the image and its tag; Exclude for ADB-S
    image:
      # -- Registry host. Overridden by global.imageRegistry when that is set.
      # When empty, `repository` is used verbatim (e.g. when the host is baked
      # into the repository string).
      registry: ""
      # -- For SIDB-FREE/ADB-FREE, repository location of the image
      repository: ""
      pullPolicy: IfNotPresent
      # -- For SIDB-FREE/ADB-FREE, tag of the image.
      tag: ""

    # -- For ADB-S, OCID of the Autonomous Database
    # Exclude for SIDB-FREE/ADB-FREE/OTHER
    oci:
      # -- OCID of the Autonomous Database
      ocid: ""

    # -- For ADB-S, configuration for using existing secrets instead of creating new ones.
    # This is useful when deploying as a subchart of another chart (e.g., obaas) that
    # already manages the ADB wallet secrets.
    adb:
      # -- Set to true to use existing ADB secrets instead of creating new ones.
      # When true, the chart will NOT create AutonomousDatabase or wallet-pass resources,
      # assuming they already exist with the standard naming convention:
      # <fullname>-adb-tns-admin-<Release.Revision> and <fullname>-adb-wallet-pass-<Release.Revision>,
      # where <fullname> resolves to the chart's `ai-optimizer.fullname` helper
      # (typically "<release>-ai-optimizer", or just "<release>" when the release
      # name already contains the chart name).
      useExisting: false
      # -- (Optional) Override the TNS admin secret name. If empty, uses default naming.
      tnsAdminSecretName: ""
      # -- (Optional) Override the wallet password secret name. If empty, uses default naming.
      walletPassSecretName: ""
      # -- (Optional) Key within walletPassSecretName that contains the password.
      # If not specified, defaults to the secret name.
      walletPassSecretKey: ""
      # -- Skip client-side CRD discovery when templating ADB-S offline.
      skipCrdCheck: false
      # -- TNS alias from the wallet's tnsnames.ora (e.g., mydb_low).
      # Required when auto-creating the auth secret for ADB-S.
      serviceName: ""

    # -- For OTHER; Database connectivity
    # Either provide 'dsn' OR all of (host, port, serviceName)
    other:
      # -- Full DSN string (e.g: mydbhost.com:1521/mydb_service)
      # If provided, supersedes host/port/serviceName
      dsn: ""
      # -- Database host (e.g: mydbhost.com)
      # Required if dsn is not provided
      host: ""
      # -- Database port (e.g: 1521)
      # Required if dsn is not provided
      port: ""
      # -- Database service name (e.g: mydb_service)
      # Required if dsn is not provided
      serviceName: ""

    # -- Application User Authentication/Connection Details
    authn:
      # -- Name of Secret containing the authentication/connection details.
      # Empty defaults to "<fullname>-db-authn" (chart-managed, release-scoped,
      # carries helm.sh/resource-policy: keep so the password survives upgrades).
      # Set to an explicit name to share a Secret across releases or bring your
      # own. The chart skips creation if a Secret with the resolved name exists.
      secretName: ""
      # -- Key in secretName containing the username
      usernameKey: "username"
      # -- Key in secretName containing the password
      passwordKey: "password"
      # -- Key in secretName containing the connection service name
      serviceKey: "service"
    # -- (Optional) Privileged User Authentication/Connection Details
    # If defined, used to create the user defined in the authn secret
    privAuthn:
      # -- secretName containing privileged user (i.e. ADMIN/SYSTEM) password.
      # Empty defaults to "<fullname>-db-priv-authn"; same chart-managed contract
      # as authn.secretName above.
      secretName: ""
      # -- Key in secretName containing the username
      usernameKey: "username"
      # -- Key in secretName containing the password
      passwordKey: "password"
      # -- Key in secretName containing the connection service name
      serviceKey: "service"

  # -- Oracle Cloud Infrastructure Configuration
  ociConfig:
    # -- Enable Workload Identity Principals (IAM policies must exist)
    oke: false
    # -- (Optional) Name of Pre-created configMap storing OCI API AuthN
    configMapName: ""
    # -- Tenancy OCID.  Required when specifying keySecretName.
    tenancy: ""
    # -- User OCID.  Required when specifying keySecretName.
    user: ""
    # -- Fingerprint.  Required when specifying keySecretName.
    fingerprint: ""
    # -- Region. Required when oke is true.
    region: ""
    # -- Secret containing an OCI config file and the key_file(s).
    # Use the scripts/oci_config.py script to help create the secret based on an existing ~.oci/config file
    fileSecretName: ""
    # -- Secret containing a single API key corresponding to above tenancy configuration
    # This used by OraOperator when not running in OKE
    keySecretName: ""

  # -- Specify secretName and secretKey to enable 3rd-Party Models
  models:
    # -- OpenAI API Key
    openai:
      secretName: ""
      secretKey: "apiKey"
    # -- Perplexity API Key
    perplexity:
      secretName: ""
      secretKey: "apiKey"
    # -- Cohere API Key
    cohere:
      secretName: ""
      secretKey: "apiKey"

  # -- OpenTelemetry export configuration (server only).
  # Wires the running pod up to a separately-deployed OTLP collector
  # (e.g. SigNoz, Jaeger, Tempo). The collector is NOT installed by
  # this chart; deploy it independently and point `endpoint` at it.
  otel:
    # -- Master switch. When false, no OTEL_* env vars are rendered and
    # the server's init_telemetry() is a no-op.
    enabled: false

    # -- OTLP receiver URL applied to all signals. In-cluster example:
    #   http://signoz-otel-collector.observability.svc.cluster.local:4317
    # Required when enabled=true unless tracesEndpoint is set, or
    # tracesExporter is set to "console" or "none". logsEndpoint alone
    # does NOT satisfy this requirement: the application activates
    # tracing first, and log export piggybacks on the traces path.
    endpoint: ""

    # -- Per-signal endpoint overrides. Empty inherits `endpoint`.
    tracesEndpoint: ""
    logsEndpoint: ""

    # -- Wire protocol. One of: grpc (port 4317) or http/protobuf (port 4318).
    # Empty = SDK default (grpc).
    protocol: ""
    tracesProtocol: ""
    logsProtocol: ""

    # -- Skip TLS verification for OTLP gRPC. Required for plaintext
    # in-cluster collectors (typical for SigNoz with no TLS sidecar).
    insecure: false

    # -- Comma-separated `k=v` headers for vendor auth (e.g. SigNoz cloud
    # API key). Prefer `headersSecret` for any value containing a credential.
    headers: ""

    # -- Pull headers from a Secret instead of plaintext values. Mutually
    # exclusive with `headers` above.
    headersSecret:
      name: ""
      key: "headers"

    # -- Override the service name shown in the backend.
    # Empty = application default ("ai-optimizer-server").
    serviceName: ""

    # -- Resource attributes attached to every span. Map of string→string;
    # the chart joins them into a comma-separated OTEL_RESOURCE_ATTRIBUTES
    # value. `deployment.environment` is already populated by the app
    # from AIO_ENV; only override here if you need a different value.
    resourceAttributes: {}
      # service.namespace: ai-optimizer
      # team: platform

    # -- Exporter selection. Comma-separated list per OTel spec.
    # Supported by the application: otlp, console, none.
    # Empty = application default (otlp).
    tracesExporter: ""

    # -- Application log export to OTLP. Opt-in. Enable only for backends
    # intended to retain application logs. Maps to AIO_OTEL_LOGS_ENABLED.
    logsEnabled: false

    # -- Override the log exporter list. Set to "none" to keep tracing
    # while suppressing logs even when logsEnabled=true.
    logsExporter: ""

    # -- Trace sampler (e.g. parentbased_traceidratio for probabilistic).
    # Empty = SDK default (parentbased_always_on).
    sampler: ""
    samplerArg: ""

    # -- Free-form additional env vars passed through to the pod. Use
    # only for OTel SDK knobs not surfaced above (e.g. OTEL_BSP_*,
    # OTEL_PROPAGATORS). Each entry rendered as a literal env var.
    extraEnv: []
      # - name: OTEL_BSP_MAX_QUEUE_SIZE
      #   value: "4096"

  # -- Environment configuration mounted as a Secret at /app/src/.env.{global.env}.
  # The chart always creates this Secret with the AIO_* settings derived
  # from chart values (server URL prefix,
  # max clients, SSL, OKE workload identity, Ollama URL). Pod env keeps
  # only AIO_ENV (bootstrap) and secretKeyRef bindings (AIO_API_KEY,
  # AIO_DB_*, model API keys). pydantic-settings reads the file directly,
  # and load_dotenv(override=False) means pod env still wins where set.
  #
  # Use this block to add operator overrides — extra AIO_* or integration
  # entries get merged into the chart-managed Secret (operator values
  # override chart defaults). To bring your own pre-built Secret with
  # .env content, set 'secretName' and the chart skips its own render.
  # envSecret:
  #   secretName: ""
  #   secretKey: "server.env"
  #   content:
  #     AIO_LOG_LEVEL: INFO
  #     AIO_DB_POOL_SIZE: "5"
  #     AIO_GENAI_COMPARTMENT_ID: "ocid1.compartment..."
  #     AIO_GENAI_REGION: "us-chicago-1"

  # livenessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10       # Time (in seconds) to wait before starting the probe
    periodSeconds: 30             # Time (in seconds) between probe checks
    timeoutSeconds: 30            # Time (in seconds) to wait for probe response
    failureThreshold: 10          # Number of failures before marking the container as unhealthy
    successThreshold: 1           # Number of successes required to consider the container healthy

  # readinessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 15
    failureThreshold: 10
    successThreshold: 1

  # volumes: user defined additional volumes
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # volumeMounts:  user defined additional volumeMounts
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # podLabels: additional key:value labels to add to pods
  podLabels: {}
    # environment: "production"
    # team: "devops"

  # podAnnotations: additional key:value annotations to add to the Pod template metadata
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9102"

  # resources: requests and limits for the container
  # Recommended not to specify default resources and to leave this as a conscious choice for the user.
  # This also increases chances charts run on environments with little resources, such as Kind.
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # nodeSelector: to constrain pods to specific nodes
  nodeSelector: {}
    # disktype: ssd

  # affinity: rules for scheduling pods
  affinity: {}
    # podAntiAffinity:
    #   requiredDuringSchedulingIgnoredDuringExecution:
    #     - labelSelector:
    #         matchExpressions:
    #           - key: app
    #             operator: In
    #             values:
    #               - my-app
    #       topologyKey: "kubernetes.io/hostname"

  # tolerations: for scheduling pods on tainted nodes
  tolerations: []
    # - key: "key1"
    #   operator: "Exists"
    #   effect: "NoSchedule"


# -----------------------
# Client Configuration
client:
  # -- Enable frontend client
  enabled: true
  # -- Number of desired pod replicas for the Deployment when autoscaling is disabled
  replicaCount: 1

  # autoscaling: HPA when enabled, requires metrics-server to be installed
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  # -- Secret name containing image pull secrets
  imagePullSecrets: []
    # - name: registry_cred

  # image: Image and Tag to pull including pull policy
  image:
    # -- Registry host. Overridden by global.imageRegistry when that is set.
    registry: localhost
    # -- Image repository (path part, no host)
    repository: ai-optimizer-client
    # -- Image tag.
    tag: ""
    pullPolicy: IfNotPresent

  # service: type of Kubernetes service to expose the HTTP port.
  service:
    type: "ClusterIP"
    # -- Service port the client is reachable on. The container always
    # listens on 8501.
    port: 8501

  # ssl: enable HTTPS on the Streamlit server.
  # Set enabled to true and optionally provide paths to cert/key files mounted into the container.
  # When certFile and keyFile are empty, a self-signed certificate is auto-generated at startup.
  ssl:
    enabled: false
    certFile: ""
    keyFile: ""

  # -- Streamlit XSRF-cookie signing secret. The operator MUST supply either:
  #   1) cookieSecret — an inline 32+ char random string; Helm creates a Secret.
  #   2) cookieSecretName — the name of a pre-existing Secret in the release namespace.
  # Exactly one of the two must be set. There is no auto-generation: a shared,
  # stable value is required across all replicas of the client Deployment, and
  # silent generation would diverge keys across replicas under scale-out.
  # Same contract as global.api.apiKey / global.api.secretName.
  cookieSecret: ""
  # -- Name of a pre-existing Secret containing the XSRF cookie signing key.
  # Rotation contract: after rotating the Secret's contents in place, run
  # `helm upgrade` so the chart reads the new value via `lookup` and rolls the
  # client Deployment. Without the upgrade, running pods keep the stale value
  # cached from container start. Automated rotation on Secret-change requires
  # a reloader controller and is out of scope for this chart.
  cookieSecretName: ""
  # -- Key inside cookieSecretName / the generated Secret that holds the value.
  cookieSecretKey: "cookieSecret"

  # -- Shared password for selected client UI controls. Exactly one (or none)
  # of password / passwordSecretName / passwordAutoGenerate may be set; the
  # chart fails the render when more than one is active. With none set, the
  # additional UI access check is disabled. Applies to the Streamlit client
  # UI only; API access continues to be governed by AIO_API_KEY.
  password: ""
  # -- Name of a pre-existing Secret containing the shared password (BYO).
  # The chart references it but does not create or manage its lifecycle.
  passwordSecretName: ""
  # -- Key inside passwordSecretName / the generated Secret that holds the value.
  passwordSecretKey: "password"
  # -- Auto-generate the shared password and let the chart own the Secret.
  # On first install the chart creates `<fullname>-client-password` with a
  # random value and `helm.sh/resource-policy: keep` so it survives upgrade
  # and uninstall. Requires Helm with cluster access at render time — under
  # `helm template` / ArgoCD without server-side render, `lookup` returns
  # empty and the chart would re-mint the password on every render, so
  # `kubectl apply` of that output would rotate the live Secret. Use BYO
  # (passwordSecretName) instead for those pipelines.
  passwordAutoGenerate: false

  # -- OCI source defaults applied to the Split & Embed tab for every user
  # of this deployment. The compartment is the anchor; the bucket alone
  # has no effect. The chart passes any supplied value into the pod env
  # faithfully — validation happens client-side at render time, with a
  # silent fallback to free choice when a value cannot be resolved.
  oci:
    # -- Compartment OCID to pin as the source compartment.
    # Pins the "Bucket compartment:" control on the Split & Embed tab when
    # the OCID resolves to a compartment visible to the active OCI auth
    # profile; otherwise the client silently falls back to free choice.
    # The chart does not pre-validate the OCID.
    sourceBucketCompartmentId: ""
    # -- Bucket name to pin as the source bucket. Requires
    # sourceBucketCompartmentId to also be set and to resolve at the
    # client; otherwise this value is silently ignored at render time.
    # When the bucket exists in the pinned compartment, the
    # "Source bucket:" selectbox is pinned + disabled. When it doesn't,
    # the bucket selectbox silently falls back to free choice within the
    # pinned compartment. The chart does not pre-validate; it injects
    # the env var faithfully whenever this value is set, so an orphan
    # bucket name will appear in pod env but be ignored by the client.
    sourceBucketName: ""

  # Gateway: controls the Gateway API resources to expose the service
  gateway:
    enabled: false
    className: eg # GatewayClass name (e.g., "eg" for Envoy Gateway controller)
  #    tls:
  #      mode: Terminate
  #      certificateRefs:
  #        - kind: Secret
  #          group: ""
  #          name: default-cert

  # ingress: controls the Ingress resource to expose the service.
  ingress:
    enabled: false
    className: nginx # IngressClass name (e.g., "nginx" for NGINX ingress controller)
    tls: [ ]
    # - hosts:
    #     - example.com
    #   secretName: example-tls

  # -- Environment configuration mounted as a Secret at /app/src/.env.{global.env}.
  # The chart always creates this Secret with the AIO_* settings derived
  # from chart values (server URL, server port, client SSL). Pod env
  # keeps only AIO_ENV plus the secretKeyRef bindings for AIO_API_KEY
  # and AIO_CLIENT_COOKIE_SECRET.
  #
  # Use this block to add operator overrides — extra AIO_* entries get
  # merged into the chart-managed Secret. To bring your own pre-built
  # Secret with .env content, set 'secretName' and the chart skips its
  # own render.
  # envSecret:
  #   secretName: ""
  #   secretKey: "client.env"
  #   content:
  #     AIO_LOG_LEVEL: INFO

  # livenessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 20       # Time (in seconds) to wait before starting the probe
    periodSeconds: 20             # Time (in seconds) between probe checks
    timeoutSeconds: 1             # Time (in seconds) to wait for probe response
    failureThreshold: 3           # Number of failures before marking the container as unhealthy
    successThreshold: 1           # Number of successes required to consider the container healthy

  # readinessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  # volumes: user defined additional volumes
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # volumeMounts:  user defined additional volumeMounts
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # podLabels: additional key:value labels to add to pods
  podLabels: {}
    # environment: "production"
    # team: "devops"

  # podAnnotations: additional key:value annotations to add to the Pod template metadata
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9102"

  # resources: requests and limits for the container
  # Recommended not to specify default resources and to leave this as a conscious choice for the user.
  # This also increases chances charts run on environments with little resources, such as Kind.
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # nodeSelector: to constrain pods to specific nodes
  nodeSelector: {}
    # disktype: ssd

  # affinity: rules for scheduling pods
  affinity: {}
    # podAntiAffinity:
    #   requiredDuringSchedulingIgnoredDuringExecution:
    #     - labelSelector:
    #         matchExpressions:
    #           - key: app
    #             operator: In
    #             values:
    #               - my-app
    #       topologyKey: "kubernetes.io/hostname"

  # tolerations: for scheduling pods on tainted nodes
  tolerations: []
    # - key: "key1"
    #   operator: "Exists"
    #   effect: "NoSchedule"

# -----------------------
# Ollama Configuration
ollama:
  # -- Enable out-of-box Ollama Models
  enabled: false

  # -- Number of desired pod replicas for the Deployment
  replicaCount: 1

  # imagePullSecrets: Secret name containing image pull secrets
  imagePullSecrets: []
    # - name: registry_cred

  # image: Image and Tag to pull including pull policy
  image:
    # -- Registry host. Overridden by global.imageRegistry when that is set.
    registry: docker.io
    # -- Image repository (path part, no host)
    repository: ollama/ollama
    # -- Image tag.
    tag: "0.23.1"
    pullPolicy: IfNotPresent

  # service: type of Kubernetes service to expose the HTTP port.
  service:
    http:
      type: "ClusterIP"

  # models: to automatically deploy if enabled
  models:
    # -- Enable automatic pulling of models
    enabled: true
    # -- List of models to automatically pull
    modelPullList:
      - llama3.2:3b
      - mxbai-embed-large

  # livenessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 20       # Time (in seconds) to wait before starting the probe
    periodSeconds: 20             # Time (in seconds) between probe checks
    timeoutSeconds: 1             # Time (in seconds) to wait for probe response
    failureThreshold: 3          # Number of failures before marking the container as unhealthy
    successThreshold: 1           # Number of successes required to consider the container healthy

  # readinessProbe: defines settings for the liveness probe.
  # Set `enabled` to false to disable the probe entirely.
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  # podLabels: additional key:value labels to add to pods
  podLabels: {}
    # environment: "production"
    # team: "devops"

  # podAnnotations: additional key:value annotations to add to the Pod template metadata
  podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/port: "9102"

  # -- Requests and limits for the container.
  # Often used to ensure pod is running on a GPU worker
  resources: {}
    # limits:
    #   nvidia.com/gpu: 1

  # -- Constrain pods to specific nodes
  # Often used to ensure pod is running on a GPU worker
  nodeSelector: {}
    # disktype: ssd

  # -- Rules for scheduling pods
  # Often used to ensure pod is running on a GPU worker
  affinity: {}
    # podAntiAffinity:
    #   requiredDuringSchedulingIgnoredDuringExecution:
    #     - labelSelector:
    #         matchExpressions:
    #           - key: app
    #             operator: In
    #             values:
    #               - my-app
    #       topologyKey: "kubernetes.io/hostname"

  # -- For scheduling pods on tainted nodes
  # Often used to ensure pod is running on a GPU worker
  tolerations: []
    # - key: "key1"
    #   operator: "Exists"
    #   effect: "NoSchedule"

# -----------------------
# SigNoz Configuration
# Optional in-cluster OTLP backend deployed as a subchart
# (https://github.com/SigNoz/charts).
#
# When enabled, the SigNoz OTel collector becomes the default destination
# for `server.otel`: if `server.otel.enabled=true` and `server.otel.endpoint`
# is empty, the chart fills in the in-cluster collector URL automatically.
# Operator-supplied `server.otel.endpoint` always wins.
#
# SigNoz is heavy: the default deploy runs ClickHouse, the query service,
# the frontend, and an OTel collector. Plan for ~3-5 GiB RAM minimum.
# For everything below the `enabled` switch, see the upstream chart's
# values.yaml for the full surface area; the keys here pass through
# verbatim under the `signoz:` namespace.
signoz:
  # -- Master switch. When false, the subchart's resources are not rendered
  # (gated by Chart.yaml's `condition: signoz.enabled`).
  enabled: false
  # -- Authentication configuration for the SigNoz admin user.
  auth:
    # -- When false (default), this chart creates the Secret named below
    # with an auto-generated password. When true, the operator must
    # pre-create the Secret. Required keys: email, password, orgName.
    existingSecret: false
    # -- Name of the Secret that holds the SigNoz admin credentials.
    # Read by both the chart's authn-secret template and the setup Job's
    # volume mount. To use a name other than `signoz-authn`, ALSO override
    # the three `signoz.signoz.env.SIGNOZ_USER_ROOT_*.valueFrom.secretKeyRef.name`
    # entries below — the subchart env block is static YAML and cannot
    # follow this value.
    secretName: "signoz-authn"
    # -- Org display name for the admin user (ignored when existingSecret: true).
    orgName: "AIOptimizer"
    # -- Email for the admin user (ignored when existingSecret: true).
    # The matching password is auto-generated and stored in the Secret.
    email: "admin@aioptimizer.local"
  cleanup:
    # -- Create RBAC resources used by the SigNoz pre-delete cleanup hook.
    rbac:
      create: true
    # -- ServiceAccount settings for the SigNoz pre-delete cleanup hook.
    serviceAccount:
      create: true
      name: ""
  signoz:
    env:
      SIGNOZ_USER_ROOT_ENABLED: "true"
      SIGNOZ_USER_ROOT_ORG_NAME:
        valueFrom:
          secretKeyRef:
            name: "signoz-authn"
            key: orgName
      SIGNOZ_USER_ROOT_EMAIL:
        valueFrom:
          secretKeyRef:
            name: "signoz-authn"
            key: email
      SIGNOZ_USER_ROOT_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: "signoz-authn"
            key: password
  clickhouse:
    zookeeper:
      image:
        # -- Set explicitly because the SigNoz subchart's global registry
        # injection does not reach this nested image; rendering fails when
        # global.imageRegistry is empty unless this is set.
        registry: docker.io

  # -- Private-registry deployments should also set clickhouse.initContainers.udf.enabled=false
  # because the udf initContainer downloads a binary from github.com at pod start.
  # Trade-off: the histogramQuantile UDF is unavailable.

  # -- Override the upstream collector image, namespace placement, etc.
  # Anything valid in https://github.com/SigNoz/charts goes here.
  # Example surface for the collector's service:
  #   otelCollector:
  #     service:
  #       type: ClusterIP   # default; LoadBalancer/NodePort also work
  #     replicaCount: 1
