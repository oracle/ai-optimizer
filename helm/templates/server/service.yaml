# spell-checker: ignore nindent

apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-optimizer.server.serviceName" . }}
  labels:
    app.kubernetes.io/component: server
    {{- include "ai-optimizer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.server.service.port | default 8000 }}
      targetPort: 8000
  selector:
    app.kubernetes.io/component: server
    {{- include "ai-optimizer.selectorLabels" . | nindent 4 }}
