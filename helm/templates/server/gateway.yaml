# spell-checker: ignore nindent

{{ if .Values.server.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "server.serviceName" . }}
  labels:
    app.kubernetes.io/component: server
    {{- include "global.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.server.gateway.className }}
  listeners:
    - name: http
      port: {{ .Values.server.service.port | default 8000 }}
      protocol: HTTP
      {{- with .Values.server.gateway.tls }}
      tls:
{{ toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "server.serviceName" . }}
spec:
  parentRefs:
    - name: {{ include "server.serviceName" . }}
  rules:
    - backendRefs:
        - name: {{ include "server.serviceName" . }}
          port: {{ .Values.server.service.port | default 8000 }}
      matches:
        - path:
            type: PathPrefix
            value: {{ include "global.getPath" . }}v1
{{- end }}
