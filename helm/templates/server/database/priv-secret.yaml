spell-checker: ignore nindent

Database Privileged User Secret

Skip rendering when the operator pinned `privAuthn.secretName` — same
offline-render contract as auth-secret.yaml: an explicit name signals
operator-owned; the chart must not produce a same-named Secret with
chart-generated random SYSTEM/ADMIN credentials that GitOps apply
would overwrite the real one with. */}}
{{- if and .Values.server.database .Values.server.database.type (ne (include "ai-optimizer.server.database.isOther" .) "true") }}
{{- if eq (include "ai-optimizer.server.database.explicitPrivAuthnName" .) "" }}
{{- $secretName := include "ai-optimizer.server.databasePrivSecret" . }}
{{- $secret_existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $secret_existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/component: database
    {{- include "ai-optimizer.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  username: {{ if eq (include "ai-optimizer.server.database.isADB" .) "true" }}"ADMIN"{{ else }}"SYSTEM"{{ end }}
  password: {{ include "ai-optimizer.server.randomPassword" . | quote }}
  {{ default "service" .Values.server.database.privAuthn.serviceKey }}: {{ include "ai-optimizer.server.database.connectionString" . | quote }}
{{- end }}
{{- end }}
{{- end }}
