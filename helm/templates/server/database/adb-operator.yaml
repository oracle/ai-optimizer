spell-checker: ignore nindent ocid

AutonomousDatabase Operator Resource (ADB-S)
Skip creating this resource if using existing ADB secrets (e.g., from obaas chart) */}}
{{- if .Values.server.database }}
{{- if eq (include "ai-optimizer.server.database.isADBS" .) "true" }}
{{- if ne (include "ai-optimizer.server.database.useExistingAdbSecrets" .) "true" }}
{{- if and (not (.Values.server.database.adb.skipCrdCheck | default false)) (not (.Capabilities.APIVersions.Has "database.oracle.com/v4/AutonomousDatabase")) }}
{{- fail "server.database.type is ADB-S and server.database.adb.useExisting=false, but the database.oracle.com/v4 AutonomousDatabase CRD is not available. Install the Oracle Database Operator first, or set server.database.adb.skipCrdCheck=true for offline templating." }}
{{- end }}
apiVersion: database.oracle.com/v4
kind: AutonomousDatabase
metadata:
  name: {{ include "ai-optimizer.server.database.adbResourceName" . }}
  labels:
    app.kubernetes.io/component: database
    {{- include "ai-optimizer.labels" . | nindent 4 }}
spec:
  {{- /* `spec.action` is owned by the OraOperator after the initial bind:
         the operator writes to it to drive lifecycle ops (Restart, Stop,
         Sync, …) and resets it on completion. Re-templating it on every
         upgrade fights server-side-apply field ownership and fails with
         a "conflict with manager" error. Gate on whether this CR already
         exists in the cluster, not on `.Release.IsInstall` — that flag
         misses the upgrade path where a release migrates to ADB-S and
         this CR is created for the first time during a helm upgrade.
         To re-issue an action later,
         `kubectl patch adb <name> --type=merge -p '{"spec":{"action":"Sync"}}'`. */}}
  {{- $adbName := include "ai-optimizer.server.database.adbResourceName" . }}
  {{- $existing := lookup "database.oracle.com/v4" "AutonomousDatabase" .Release.Namespace $adbName }}
  {{- if not $existing }}
  action: "Sync"
  {{- end }}
  details:
    id: {{ .Values.server.database.oci.ocid }}
  wallet:
    name: {{ include "ai-optimizer.server.database.adbTnsAdminSecret" . }}
    password:
      k8sSecret:
        name: {{ include "ai-optimizer.server.database.adbWalletPassSecret" . }}
  {{- if .Values.server.ociConfig }}
  ociConfig:
    configMapName: {{ include "ai-optimizer.server.ociConfigMapName" . }}
    {{- if .Values.server.ociConfig.keySecretName }}
    secretName: {{ .Values.server.ociConfig.keySecretName }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
