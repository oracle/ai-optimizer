spell-checker: ignore nindent

ADB Wallet Password Secret
Skip creating this secret if using existing ADB secrets (e.g., from obaas chart) */}}
{{- if .Values.server.database }}
{{- if eq (include "ai-optimizer.server.database.isADBS" .) "true" }}
{{- if ne (include "ai-optimizer.server.database.useExistingAdbSecrets" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-optimizer.server.database.adbWalletPassSecret" . }}
  labels:
    app.kubernetes.io/component: database
    {{- include "ai-optimizer.labels" . | nindent 4 }}
stringData:
  {{ include "ai-optimizer.server.database.adbWalletPassSecretKey" . }}: {{ include "ai-optimizer.server.randomPassword" . | quote }}
{{- end }}
{{- end }}
{{- end }}
