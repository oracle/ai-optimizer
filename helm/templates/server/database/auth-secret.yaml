spell-checker: ignore nindent freepdb1

Database Authentication Secret

Skip rendering entirely when the operator pinned `authn.secretName` —
that signals an operator-owned, externally managed Secret. Offline render
paths (helm template, Argo CD/Flux apply) would otherwise produce a
chart-managed Secret with the operator's name and chart-generated random
credentials, overwriting the real BYO Secret on apply because `lookup`
returns empty without cluster access. The chart-managed lookup+create
path still fires when the operator left `authn.secretName` empty (the
chart owns the fullname-suffixed default name). */}}
{{- if and .Values.server.database .Values.server.database.type }}
{{- include "ai-optimizer.server.database.validateOtherType" . }}
{{- if eq (include "ai-optimizer.server.database.explicitAuthnName" .) "" }}
{{- $secretName := include "ai-optimizer.server.databaseSecret" . }}
{{- $secret_existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $secret_existing }}
{{- include "ai-optimizer.server.database.validateADBSType" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/component: database
    {{- include "ai-optimizer.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ default "username" .Values.server.database.authn.usernameKey }}: "AI_OPTIMIZER"
  {{ default "password" .Values.server.database.authn.passwordKey }}: {{ include "ai-optimizer.server.randomPassword" . | quote }}
  {{ default "service" .Values.server.database.authn.serviceKey }}: {{ include "ai-optimizer.server.database.connectionString" . | quote }}
{{- end }}
{{- end }}
{{- end }}
