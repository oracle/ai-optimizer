{{- if .Values.server.ociConfig }}
{{- /* Validate OCI config settings */ -}}
{{- include "ai-optimizer.server.ociConfig.validate" . }}
{{- /* Only create ConfigMap if configMapName is not specified and at least one value is provided */ -}}
{{- if not .Values.server.ociConfig.configMapName }}
{{- $tenancy := .Values.server.ociConfig.tenancy | default "" }}
{{- $user := .Values.server.ociConfig.user | default "" }}
{{- $fingerprint := .Values.server.ociConfig.fingerprint | default "" }}
{{- $region := .Values.server.ociConfig.region | default "" }}
{{- if or (ne $tenancy "") (ne $user "") (ne $fingerprint "") (ne $region "") }}
{{- /* Determine the default ConfigMap name */ -}}
{{- $configMapName := include "ai-optimizer.server.ociConfigMapName" . }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configMapName }}
  labels:
    app.kubernetes.io/component: server
    {{- include "ai-optimizer.labels" . | nindent 4 }}
data:
  {{- with .Values.server.ociConfig }}
    {{- if .tenancy }}
  tenancy: {{ .tenancy | quote }}
    {{- end }}
    {{- if .user }}
  user: {{ .user | quote }}
    {{- end }}
    {{- if .fingerprint }}
  fingerprint: {{ .fingerprint | quote }}
    {{- end }}
    {{- if .region }}
  region: {{ .region | quote }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end -}}
