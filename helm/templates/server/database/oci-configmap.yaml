# spell-checker: ignore nindent

{{- if .Values.server.oci_config }}
{{- /* Validate OCI config settings */ -}}
{{- include "server.ociConfig.validate" . }}
{{- /* Only create ConfigMap if configMapName is not specified and at least one value is provided */ -}}
{{- if not .Values.server.oci_config.configMapName }}
{{- $tenancy := .Values.server.oci_config.tenancy | default "" }}
{{- $user := .Values.server.oci_config.user | default "" }}
{{- $fingerprint := .Values.server.oci_config.fingerprint | default "" }}
{{- $region := .Values.server.oci_config.region | default "" }}
{{- if or (ne $tenancy "") (ne $user "") (ne $fingerprint "") (ne $region "") }}
{{- /* Determine the default ConfigMap name */ -}}
{{- $configMapName := printf "%s-oci-config" .Release.Name }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configMapName }}
  labels:
    app.kubernetes.io/component: server
    {{- include "global.labels" . | nindent 4 }}
data:
  {{- with .Values.server.oci_config }}
    {{- if .tenancy }}
  tenancy: {{ .tenancy | quote }}
    {{- end }}
    {{- if .user }}
  user: {{ .user | quote }}
    {{- end }}
    {{- if .fingerprint }}
  fingerprint: {{ .fingerprint | quote }}
    {{- end }}
    {{- if .region }}
  region: {{ .region | quote }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end -}}