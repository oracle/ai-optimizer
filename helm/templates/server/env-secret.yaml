# spell-checker: ignore nindent

{{- $envSecret := .Values.server.envSecret | default dict -}}
{{- $content := include "server.envContent" . -}}
{{- $secretName := $envSecret.secretName | default "" -}}

{{- /* Render the chart-managed server env Secret when there is
       content to emit and the operator has not pointed envSecret at a
       pre-existing Secret. Server-only: DB/OCI/Ollama/SSL settings the
       client has no reason to mount. */ -}}
{{- if and (eq $secretName "") (ne (trim $content) "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "server.envSecretName" . }}
  labels:
    app.kubernetes.io/component: server
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "server.envSecretKey" . }}: |
    {{- $content | nindent 4 }}
{{- end }}
