{{- if .Values.client.enabled }}
{{ include "ai-optimizer.client.passwordBothSet.fail" . }}

{{- $clientPassword := .Values.client.password | trim }}
{{- if $clientPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-optimizer.client.passwordSecretName" . }}
  labels:
    app.kubernetes.io/component: client
    {{- include "ai-optimizer.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "ai-optimizer.client.passwordSecretKey" . }}: {{ $clientPassword | quote }}

{{- else if .Values.client.passwordAutoGenerate }}
{{/* Always render: a previous render under client.password (inline path) wrote
     this same Secret name without `keep`, so dropping it from the manifest on
     upgrade would make Helm delete it and break AIO_CLIENT_PASSWORD. lookup
     preserves the existing value (inline migration or steady-state upgrade);
     first install generates a random one. Mirrors
     templates/observability/signoz/authn-secret.yaml. */}}
{{- $secretName := include "ai-optimizer.client.passwordSecretName" . }}
{{- $secretKey := include "ai-optimizer.client.passwordSecretKey" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- if and $existing $existing.data (hasKey $existing.data $secretKey) }}
  {{- $password = index $existing.data $secretKey | b64dec }}
{{- else }}
  {{- $password = include "ai-optimizer.server.randomPassword" . | trim }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/component: client
    {{- include "ai-optimizer.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ $secretKey }}: {{ $password | quote }}
{{- end }}
{{- end }}
