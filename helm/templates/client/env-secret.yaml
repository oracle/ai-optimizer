# spell-checker: ignore nindent

{{- if .Values.client.enabled -}}
{{- $envSecret := .Values.client.envSecret | default dict -}}
{{- $content := include "client.envContent" . -}}
{{- $secretName := $envSecret.secretName | default "" -}}

{{- /* Render the chart-managed client env Secret when there is
       content to emit and the operator has not pointed envSecret at a
       pre-existing Secret. Client-only: the API server URL/port and
       client SSL — no DB / model / OCI config the client doesn't use. */ -}}
{{- if and (eq $secretName "") (ne (trim $content) "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "client.envSecretName" . }}
  labels:
    app.kubernetes.io/component: client
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "client.envSecretKey" . }}: |
    {{- $content | nindent 4 }}
{{- end }}
{{- end }}
