{{- if .Values.client.enabled }}
{{ include "ai-optimizer.client.cookieKeyOrSecretName.required" . }}

{{- $cookieSecret := .Values.client.cookieSecret | trim }}
{{- if $cookieSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-optimizer.client.cookieSecretName" . }}
  labels:
    app.kubernetes.io/component: client
    {{- include "ai-optimizer.labels" . | nindent 4 }}
type: Opaque
data:
  "{{ include "ai-optimizer.client.cookieSecretKey" . }}": "{{ $cookieSecret | b64enc }}"
{{- end }}
{{- end }}
