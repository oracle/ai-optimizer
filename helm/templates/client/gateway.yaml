{{ if and .Values.client.enabled .Values.client.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "ai-optimizer.fullname" . }}-client-http
  labels:
    app.kubernetes.io/component: client
    {{- include "ai-optimizer.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.client.gateway.className }}
  listeners:
    - name: http
      port: {{ .Values.client.service.port | default 8501 }}
      protocol: HTTP
      {{- with .Values.client.gateway.tls }}
      tls:
{{ toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ai-optimizer.fullname" . }}-client-http
spec:
  parentRefs:
    - name: {{ include "ai-optimizer.fullname" . }}-client-http
  rules:
    - backendRefs:
        - name: {{ include "ai-optimizer.fullname" . }}-client-http
          port: {{ .Values.client.service.port | default 8501 }}
      matches:
        - path:
            type: PathPrefix
            value: {{ include "ai-optimizer.getPath" . | trimSuffix "/" | default "/" }}
{{- end }}
