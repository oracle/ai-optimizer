# spell-checker: ignore nindent

{{- if .Values.client.enabled }}
{{ include "client.cookieKeyOrSecretName.required" . }}
{{ include "client.passwordBothSet.fail" . }}

{{- $cookieSecret := .Values.client.cookieSecret | trim }}
{{- if $cookieSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "client.cookieSecretName" . }}
  labels:
    app.kubernetes.io/component: client
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
data:
  "{{ include "client.cookieSecretKey" . }}": "{{ $cookieSecret | b64enc }}"
{{- end }}

{{- $clientPassword := .Values.client.password | trim }}
{{- if $clientPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "client.passwordSecretName" . }}
  labels:
    app.kubernetes.io/component: client
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
data:
  "{{ include "client.passwordSecretKey" . }}": "{{ $clientPassword | b64enc }}"
{{- end }}
{{- end }}
