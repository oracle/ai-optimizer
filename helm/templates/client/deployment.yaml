# spell-checker: ignore nindent tolerations streamlit snakecase

{{- if .Values.client.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "global.fullname" . }}-client
  labels:
    app.kubernetes.io/component: client
    {{- include "global.labels" . | nindent 4}}
spec:
  {{- if not .Values.client.autoscaling.enabled }}
  replicas: {{ .Values.client.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: client
      {{- include "global.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/client-cookie-secret: {{ include "client.cookieSecretChecksum" . | quote }}
        checksum/client-env-secret: {{ include "client.envSecretChecksum" . | quote }}
        {{- with .Values.client.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/component: client
        {{- include "global.labels" . | nindent 8 }}
        {{- with .Values.client.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        fsGroup: 10001
      {{- include "global.imagePullSecrets" (dict "local" .Values.client.imagePullSecrets "global" .Values.global.imagePullSecrets) | nindent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "global.image" (dict "image" .Values.client.image "global" .Values.global "appVersion" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.client.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
          env:
            - name: AIO_ENV
              value: {{ .Values.global.env | quote }}
            - name: AIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "global.apiSecretName" . }}
                  key: {{ include "global.apiSecretKey" . }}
            - name: AIO_CLIENT_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "client.cookieSecretName" . }}
                  key: {{ include "client.cookieSecretKey" . }}
          ports:
            - name: client-port
              containerPort: 8501
              protocol: TCP
          {{- if .Values.client.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ include "global.getPath" . }}ping
              port: client-port
              {{- if .Values.client.ssl.enabled }}
              scheme: HTTPS
              {{- end }}
            {{- with omit .Values.client.livenessProbe "enabled" }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.client.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ include "global.getPath" . }}ping
              port: client-port
              {{- if .Values.client.ssl.enabled }}
              scheme: HTTPS
              {{- end }}
            {{- with omit .Values.client.readinessProbe "enabled" }}
               {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.client.resources }}
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: "/app/tmp"
            - name: streamlit-config
              mountPath: /app/.streamlit
            - name: env-config
              mountPath: /app/.env.{{ .Values.global.env }}
              subPath: {{ include "client.envSecretKey" . }}
              readOnly: true
          {{- with .Values.client.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: streamlit-config
          configMap:
            name: {{ include "global.fullname" . }}-st-config
        - name: env-config
          secret:
            secretName: {{ include "client.envSecretName" . }}
      {{- with .Values.client.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{ end -}}
