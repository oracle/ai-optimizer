# spell-checker: ignore nindent

{{- $serverEnv := .Values.server.envSecret | default dict -}}
{{- $clientEnv := .Values.client.envSecret | default dict -}}
{{- $serverContent := $serverEnv.content | default dict -}}
{{- $clientContent := $clientEnv.content | default dict -}}
{{- $serverSecretName := $serverEnv.secretName | default "" -}}
{{- $clientSecretName := $clientEnv.secretName | default "" -}}

{{- /* Only create the secret if content is provided and no pre-existing secret is referenced */ -}}
{{- if or (and (eq $serverSecretName "") (gt (len $serverContent) 0)) (and (eq $clientSecretName "") (gt (len $clientContent) 0)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "global.fullname" . }}-env
  labels:
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and (eq $serverSecretName "") (gt (len $serverContent) 0) }}
  {{ include "server.envSecretKey" . }}: |
    {{- range $key, $value := $serverContent }}
    {{ $key }}={{ $value }}
    {{- end }}
  {{- end }}
  {{- if and (eq $clientSecretName "") (gt (len $clientContent) 0) }}
  {{ include "client.envSecretKey" . }}: |
    {{- range $key, $value := $clientContent }}
    {{ $key }}={{ $value }}
    {{- end }}
  {{- end }}
{{- end }}
