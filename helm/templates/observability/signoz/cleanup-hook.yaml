# spell-checker: ignore signoz nindent kubectl
{{- $signoz := .Values.signoz | default dict -}}
{{- $cleanupChi := and $signoz.enabled (dig "clickhouse" "enabled" true $signoz) }}
{{- $cleanupMigrator := and $signoz.enabled (dig "telemetryStoreMigrator" "enabled" true $signoz) }}
{{- if or $cleanupChi $cleanupMigrator }}
{{- /* Reserve room for the longer of the two suffixes
       (`-signoz-migrator-cleanup`, 24 chars) before truncating, so the two
       hook names stay distinct under long fullnames or fullnameOverride. */ -}}
{{- $prefix := include "global.fullname" . | trunc 39 | trimSuffix "-" }}
{{- $name := printf "%s-signoz-cleanup" $prefix }}
{{- $migratorCleanup := printf "%s-signoz-migrator-cleanup" $prefix }}
{{- /* Mirror the subchart's telemetryStoreMigrator.fullname /
       serviceAccountName helpers, including their `default` fallback on
       empty strings — `dig` returns the explicit empty value instead of
       the default, which would render `kubectl delete job.batch ""` and
       fail under `set -e`. */ -}}
{{- $migratorJob := default "signoz-telemetrystore-migrator" (dig "telemetryStoreMigrator" "name" "" $signoz) }}
{{- $migratorSACreate := dig "telemetryStoreMigrator" "serviceAccount" "create" true $signoz }}
{{- $migratorSAOverride := dig "telemetryStoreMigrator" "serviceAccount" "name" "" $signoz }}
{{- $migratorSA := default $migratorJob $migratorSAOverride }}
{{- $chi := include "signoz.clickhouseFullname" . }}
{{- $chiNamespace := include "signoz.clickhouseNamespace" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
{{- if $cleanupChi }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $chiNamespace }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["clickhouse.altinity.com"]
    resources: ["clickhouseinstallations"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "pods", "services"]
    verbs: ["get", "list", "watch", "delete"]
{{- if .Values.global.cleanupPVCs }}
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $chiNamespace }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
{{- end }}
{{- if $cleanupMigrator }}
---
{{- /* The subchart converts the migrator SA+Job into pre-upgrade hooks;
       helm uninstall orphans them and blocks the next install. Lives in
       the release namespace regardless of where ClickHouse runs. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $migratorCleanup }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $migratorCleanup }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $migratorCleanup }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/component: observability
        {{- include "global.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ $name }}
      restartPolicy: Never
      {{- include "global.imagePullSecrets" (dict "local" (list) "global" .Values.global.imagePullSecrets) | nindent 6 }}
      containers:
        - name: kubectl
          image: {{ include "global.image" (dict "image" .Values.utilities.kubectl.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.utilities.kubectl.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              release_ns={{ .Release.Namespace | quote }}
              {{- if $cleanupMigrator }}
              migrator_job={{ $migratorJob | quote }}
              {{- if $migratorSACreate }}
              migrator_sa={{ $migratorSA | quote }}
              {{- end }}

              echo "Deleting orphaned telemetrystore-migrator hook resources"
              kubectl -n "$release_ns" delete job.batch "$migrator_job" \
                --ignore-not-found=true --wait=false
              {{- if $migratorSACreate }}
              kubectl -n "$release_ns" delete serviceaccount "$migrator_sa" \
                --ignore-not-found=true --wait=false
              {{- end }}
              {{- end }}
              {{- if $cleanupChi }}
              ns={{ $chiNamespace | quote }}
              chi={{ $chi | quote }}
              label_selector="clickhouse.altinity.com/chi=${chi}"

              {{- include "global.shellWaitFunc" . | nindent 14 }}

              list_chi_children() {
                kubectl -n "$ns" get configmap,statefulset,pod,service -l "$label_selector" \
                  -o name --ignore-not-found
              }

              chi_present() {
                # Non-empty stdout means the CHI still exists (Active or Terminating).
                [ -n "$(kubectl -n "$ns" get clickhouseinstallation.clickhouse.altinity.com "$chi" \
                  -o name --ignore-not-found)" ]
              }

              echo "Deleting ClickHouseInstallation/${chi}"
              kubectl -n "$ns" delete clickhouseinstallation.clickhouse.altinity.com "$chi" \
                --ignore-not-found=true --wait=false

              # Operator usually cascades children via its finalizer; sweep
              # any stragglers in one batched delete.
              children=$(list_chi_children)
              if [ -n "$children" ]; then
                # shellcheck disable=SC2086
                kubectl -n "$ns" delete --ignore-not-found=true --wait=false $children
              fi

              # Wait for the operator to clear the CHI finalizer too. Returning
              # before the CR is gone lets Helm tear down the operator next,
              # leaving the CHI stuck in Terminating and blocking reinstall.
              cleanup_done() { ! chi_present && [ -z "$(list_chi_children)" ]; }
              if ! wait_until "ClickHouseInstallation and children to disappear" 90 5 cleanup_done; then
                echo "ClickHouseInstallation still present:"
                kubectl -n "$ns" get clickhouseinstallation.clickhouse.altinity.com "$chi" \
                  -o name --ignore-not-found || true
                echo "Remaining ClickHouse children:"
                list_chi_children
                exit 1
              fi

              {{- if .Values.global.cleanupPVCs }}
              echo "Deleting ClickHouse PVCs for ${chi}"
              pvcs=$(kubectl -n "$ns" get pvc -l "$label_selector" \
                -o name --ignore-not-found)
              if [ -n "$pvcs" ]; then
                # shellcheck disable=SC2086
                kubectl -n "$ns" delete --ignore-not-found=true --wait=false $pvcs
              fi
              {{- else }}
              echo "Leaving ClickHouse PVCs in place because global.cleanupPVCs=false"
              {{- end }}
              {{- end }}
{{- end }}
