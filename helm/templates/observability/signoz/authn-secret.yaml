# spell-checker: ignore signoz authn nindent
{{- if .Values.signoz.enabled }}
{{- if not .Values.signoz.auth.existingSecret }}
{{- $secretName := include "signoz.authnSecretName" . }}
{{/* Preserve the in-cluster password, email, and orgName across helm
     upgrades. A fresh randomPassword would invalidate operator logins;
     a values-side change to email/orgName after install would diverge
     from the root user SigNoz already provisioned, breaking the setup
     Job's login. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- $email := "" }}
{{- $orgName := "" }}
{{- if $existing }}
  {{- $password = index $existing.data "password" | b64dec }}
  {{- if hasKey $existing.data "email" }}
    {{- $email = index $existing.data "email" | b64dec }}
  {{- end }}
  {{- if hasKey $existing.data "orgName" }}
    {{- $orgName = index $existing.data "orgName" | b64dec }}
  {{- end }}
{{- else }}
  {{- $password = include "server.randomPassword" . | trim }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: observability
    {{- include "global.labels" . | nindent 4 }}
type: Opaque
data:
  orgName: {{ $orgName | default .Values.signoz.auth.orgName | b64enc | quote }}
  email: {{ $email | default .Values.signoz.auth.email | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
{{- end }}
{{- end }}
